<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; }
        lottie-player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <lottie-player 
        id="mainPlayer" 
        src="state01.json" 
        autoplay 
        loop>
    </lottie-player>

    <script>
        const player = document.getElementById('mainPlayer');

        // This runs once State 01 is fully loaded
        player.addEventListener('ready', () => {
            // Digging into the Lottie Shadow DOM to find the SVG
            const lottieSVG = player.shadowRoot.querySelector('svg');
            
            // Targeting your specific AE layer name
            const hotspot = lottieSVG.querySelector('[aria-label="Shape Layer 1"]');

            if (hotspot) {
                hotspot.style.cursor = "pointer";
                hotspot.addEventListener('click', () => {
                    console.log("Transitioning to State 02...");
                    player.load("state02.json");
                });
            } else {
                console.error("Could not find 'Shape Layer 1'. Check your AE layer name or Bodymovin settings.");
            }
        });
    </script>
</body>
</html>
