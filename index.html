<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        /* This makes the entire browser window clickable and the animation fill the screen */
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: transparent; 
            height: 100vh; 
            width: 100vw; 
            cursor: pointer; /* Shows the hand icon everywhere */
        }
        lottie-player { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <lottie-player 
        id="mainPlayer" 
        src="State02.json" 
        autoplay 
        loop>
    </lottie-player>

    <script>
        const player = document.getElementById('mainPlayer');
        let currentState = 1;

        // Listen for a click anywhere on the page
        window.addEventListener('click', () => {
            
            if (currentState === 1) {
                console.log("Moving from State 01 to State 02");
                player.load("State02.json");
                currentState = 2;
                
                // Optional: Change cursor back to default if State 02 
                // requires specific button clicks instead of 'anywhere'
                // document.body.style.cursor = "default";
            }
        });
    </script>
</body>
</html>
